<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>🌿 Bharat Ecosystem Builder</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Baloo+2:wght@700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --green:#00e676;--red:#ff1744;--blue:#40c4ff;--orange:#ff9100;
  --dark:#07090f;--panel:#0d1020;--star:#ffd740;--white:#f0f4ff;
  --gold:#f5a623;--purple:#c084fc;--teal:#26c6da;
}
html,body{width:100%;height:100%;overflow:hidden;touch-action:none;}
body{font-family:'Nunito',sans-serif;background:var(--dark);display:flex;flex-direction:column;}

/* ── BIOME PICKER ── */
#biomePicker{
  display:flex;align-items:center;gap:6px;padding:6px 14px;
  background:linear-gradient(180deg,#000 0%,rgba(5,7,14,0.97) 100%);
  border-bottom:1px solid rgba(255,215,64,0.12);
  flex-shrink:0;overflow-x:auto;z-index:40;scrollbar-width:none;
}
#biomePicker::-webkit-scrollbar{display:none;}
.biome-pill{
  background:rgba(255,255,255,0.04);border:1.5px solid rgba(255,255,255,0.1);
  border-radius:22px;padding:5px 14px;font-family:'Baloo 2',cursive;font-size:0.73rem;
  color:#5a6a8a;cursor:pointer;white-space:nowrap;
  transition:all 0.22s cubic-bezier(0.34,1.56,0.64,1);flex-shrink:0;
}
.biome-pill:hover:not(.locked){
  background:rgba(255,215,64,0.08);border-color:rgba(255,215,64,0.35);
  color:var(--star);transform:translateY(-2px);
  box-shadow:0 4px 14px rgba(255,215,64,0.12);
}
.biome-pill.active{
  border-color:var(--star);color:var(--star);font-size:0.77rem;
  background:rgba(255,215,64,0.09);
  box-shadow:0 0 18px rgba(255,215,64,0.22),inset 0 0 8px rgba(255,215,64,0.04);
}
.biome-pill.locked{opacity:0.3;cursor:not-allowed;filter:grayscale(0.9);}
.biome-pill.locked:hover{transform:none;box-shadow:none;background:rgba(255,255,255,0.04);border-color:rgba(255,255,255,0.1);color:#5a6a8a;}

/* WIN HINTS */
#winHints{display:flex;flex-wrap:wrap;gap:4px 8px;justify-content:center;padding:4px 6px;font-size:0.59rem;min-height:20px;}
#winHints span{white-space:nowrap;padding:2px 8px;border-radius:10px;font-weight:800;letter-spacing:0.3px;}
#winHints .hint-ok{color:#00e676;background:rgba(0,230,118,0.09);border:1px solid rgba(0,230,118,0.22);}
#winHints .hint-no{color:#ff9100;background:rgba(255,145,0,0.07);border:1px solid rgba(255,145,0,0.18);}

/* ── TOP BAR ── */
#topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:7px 16px;
  background:linear-gradient(180deg,rgba(0,0,0,0.97) 0%,rgba(5,7,14,0.93) 100%);
  border-bottom:1px solid rgba(255,255,255,0.06);
  flex-shrink:0;z-index:30;gap:10px;
  box-shadow:0 2px 20px rgba(0,0,0,0.5);
}
#gameTitle{
  font-family:'Baloo 2',cursive;font-size:0.98rem;white-space:nowrap;
  background:linear-gradient(90deg,#ffd740,#ff9100);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
#balanceMeter{flex:1;max-width:220px;}
#balLabel{font-size:0.52rem;color:#3a4a60;margin-bottom:3px;text-align:center;text-transform:uppercase;letter-spacing:1.2px;}
#balTrack{height:12px;background:rgba(255,255,255,0.05);border-radius:12px;overflow:hidden;border:1px solid rgba(255,255,255,0.08);box-shadow:inset 0 2px 5px rgba(0,0,0,0.4);}
#balFill{height:100%;width:0%;border-radius:12px;transition:width 0.65s cubic-bezier(0.34,1,0.64,1),background 0.65s;background:#555;position:relative;}
#balFill.live::after{content:'';position:absolute;top:1px;bottom:1px;right:0;width:5px;background:rgba(255,255,255,0.75);border-radius:0 4px 4px 0;box-shadow:0 0 8px rgba(255,255,255,0.9);}
#balText{font-size:0.59rem;text-align:center;margin-top:3px;color:#4a5a78;font-weight:800;letter-spacing:0.5px;}
#seasonWrap{display:flex;align-items:center;gap:5px;flex-shrink:0;}
#seasonBtn{background:rgba(38,198,218,0.07);border:1.5px solid rgba(38,198,218,0.18);border-radius:16px;padding:4px 10px;font-size:0.67rem;color:var(--teal);cursor:pointer;white-space:nowrap;font-family:'Baloo 2',cursive;transition:all 0.18s;}
#seasonBtn:hover{border-color:var(--blue);background:rgba(64,196,255,0.12);box-shadow:0 0 12px rgba(64,196,255,0.18);}
#seasonBadge{font-size:0.65rem;background:rgba(64,196,255,0.07);border:1px solid rgba(64,196,255,0.18);border-radius:12px;padding:3px 8px;color:#6ab4e8;white-space:nowrap;}
#soundBtn{background:rgba(255,255,255,0.04);border:1.5px solid rgba(255,255,255,0.1);border-radius:50%;width:32px;height:32px;font-size:0.88rem;color:#4a5a78;cursor:pointer;flex-shrink:0;transition:all 0.18s;display:flex;align-items:center;justify-content:center;}
#soundBtn:hover{border-color:var(--star);color:var(--star);}
#scoreArea{display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0;}
#scorePill{background:linear-gradient(135deg,rgba(245,166,35,0.12),rgba(255,145,0,0.06));border:1.5px solid rgba(255,215,64,0.3);border-radius:20px;padding:3px 12px;font-family:'Baloo 2',cursive;font-size:0.83rem;color:var(--star);white-space:nowrap;transition:transform 0.22s;box-shadow:0 0 12px rgba(255,215,64,0.08);}
#rankBadge{font-size:0.55rem;background:rgba(192,132,252,0.1);border:1px solid rgba(192,132,252,0.25);border-radius:10px;padding:2px 7px;color:var(--purple);white-space:nowrap;transition:transform 0.3s;}

/* ── MAIN ── */
#main{display:flex;flex:1;overflow:hidden;}

/* ── SIDEBAR ── */
#sidebar{
  width:92px;
  background:linear-gradient(180deg,rgba(4,6,12,0.99) 0%,rgba(7,9,18,0.98) 100%);
  border-right:1px solid rgba(255,255,255,0.06);
  display:flex;flex-direction:column;overflow-y:auto;padding:8px 5px;gap:4px;flex-shrink:0;z-index:20;
  scrollbar-width:thin;scrollbar-color:rgba(255,215,64,0.15) transparent;
}
#sidebar::-webkit-scrollbar{width:3px;}
#sidebar::-webkit-scrollbar-thumb{background:rgba(255,215,64,0.15);border-radius:3px;}
.sidebar-section{font-size:0.43rem;color:rgba(255,255,255,0.22);font-weight:900;text-transform:uppercase;letter-spacing:1.5px;text-align:center;padding:3px 0 2px;margin-top:5px;border-bottom:1px solid rgba(255,255,255,0.06);}
.item-card{
  background:linear-gradient(145deg,rgba(255,255,255,0.055),rgba(255,255,255,0.018));
  border:1.5px solid rgba(255,255,255,0.09);
  border-radius:12px;padding:7px 4px 5px;text-align:center;cursor:grab;
  transition:all 0.22s cubic-bezier(0.34,1.56,0.64,1);position:relative;overflow:hidden;
}
.item-card:hover,.item-card:active{
  background:linear-gradient(145deg,rgba(255,215,64,0.11),rgba(255,145,0,0.05));
  border-color:rgba(255,215,64,0.4);
  transform:translateY(-3px) scale(1.05);
  box-shadow:0 10px 22px rgba(0,0,0,0.55),0 0 14px rgba(255,215,64,0.18);
}
.item-card.dragging{opacity:0.25;transform:scale(0.87);}
.item-emoji{font-size:1.75rem;display:block;line-height:1.1;margin-bottom:2px;}
.item-label{font-size:0.44rem;font-weight:800;color:#3a4a60;letter-spacing:0.5px;text-transform:uppercase;}

/* ── CANVAS ── */
#canvasWrap{flex:1;position:relative;overflow:hidden;}
#bgCanvas{position:absolute;inset:0;width:100%;height:100%;}
#rainCanvas{position:absolute;inset:0;pointer-events:none;z-index:4;display:none;}
#vignette{position:absolute;inset:0;z-index:6;pointer-events:none;background:radial-gradient(ellipse at 50% 38%,transparent 50%,rgba(0,0,0,0.4) 100%);}
#dropZone{position:absolute;inset:0;z-index:5;}

/* PLACED ITEMS */
.placed{
  position:absolute;z-index:10;display:flex;flex-direction:column;align-items:center;
  cursor:pointer;transform-origin:bottom center;user-select:none;
  animation:dropIn 0.52s cubic-bezier(0.34,1.75,0.5,1);
}
.placed:hover{z-index:15;}
@keyframes dropIn{
  0%{transform:translateY(-55px) scale(0.25) rotate(-8deg);opacity:0}
  60%{opacity:1}80%{transform:translateY(5px) scale(1.06) rotate(1deg)}
  100%{transform:translateY(0) scale(1) rotate(0);opacity:1}
}
.placed:not(.water)::after{
  content:'';position:absolute;bottom:12px;left:50%;transform:translateX(-50%);
  width:46px;height:13px;background:rgba(0,0,0,0.38);border-radius:50%;
  filter:blur(4.5px);z-index:-1;
}
.placed .p-emoji{font-size:2.85rem;display:block;filter:drop-shadow(2px 6px 7px rgba(0,0,0,0.65));animation:idleFloat 2.8s ease-in-out infinite;}
.placed.plant .p-emoji{animation:plantSway 3.2s ease-in-out infinite;}
@keyframes idleFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
@keyframes plantSway{0%,100%{transform:rotate(-4deg) translateY(0)}50%{transform:rotate(4deg) translateY(-2px)}}

/* WATER POOLS */
.placed.water{transform-origin:center center;}
.water-pool{width:112px;height:46px;border-radius:50%;position:relative;box-shadow:0 10px 26px rgba(0,0,0,0.5),inset 0 6px 14px rgba(255,255,255,0.55),inset 0 -8px 16px rgba(0,30,60,0.5);animation:poolShimmer 4s ease-in-out infinite;overflow:hidden;}
.water-pool::before{content:'';position:absolute;top:14%;left:-45%;width:55%;height:26%;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.65),transparent);border-radius:50%;animation:poolGlint 4.5s linear infinite;}
.wp-emoji{position:absolute;top:50%;left:50%;transform:translate(-50%,-60%);font-size:1.65rem;filter:drop-shadow(0 2px 4px rgba(0,0,0,0.5));z-index:2;}
@keyframes poolShimmer{0%,100%{transform:scaleX(1) scaleY(1)}50%{transform:scaleX(1.05) scaleY(0.94)}}
@keyframes poolGlint{0%{left:-50%}100%{left:130%}}

/* SEED GROWTH */
.placed .p-emoji.seedling{font-size:1.5rem;}
.placed .p-emoji.grown{animation:growPop 0.65s cubic-bezier(.34,1.72,.5,1);}
@keyframes growPop{0%{transform:scale(0.15) rotate(-20deg)}60%{transform:scale(1.25) rotate(3deg)}100%{transform:scale(1)}}
.grow-beam{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);width:50px;height:140px;z-index:-1;pointer-events:none;background:linear-gradient(to bottom,rgba(255,236,150,0) 0%,rgba(255,238,160,0.28) 55%,rgba(255,220,100,0.6) 100%);clip-path:polygon(40% 0,60% 0,100% 100%,0% 100%);animation:beamPulse 1.2s ease-in-out infinite;}
@keyframes beamPulse{0%,100%{opacity:0.4;filter:brightness(1)}50%{opacity:0.95;filter:brightness(1.3)}}

/* SKY CREATURES */
.placed.sky-creature{transition:left 2.5s ease-in-out, top 2.5s ease-in-out;}
.placed.sky-creature::after{display:none!important;}
.placed.sky-creature .p-emoji{
  font-size:2.6rem;
  animation:eagleSoar 3.8s ease-in-out infinite!important;
  filter:drop-shadow(2px 4px 12px rgba(0,0,0,0.45));
}
@keyframes eagleSoar{
  0%  {transform:translateY(0)    scaleY(1)    rotate(-6deg)  scaleX(1);}
  15% {transform:translateY(-16px) scaleY(0.88) rotate(-10deg) scaleX(1.04);}
  35% {transform:translateY(-8px)  scaleY(1.06) rotate(-6deg)  scaleX(0.98);}
  55% {transform:translateY(10px)  scaleY(0.9)  rotate(-2deg)  scaleX(1.04);}
  75% {transform:translateY(4px)   scaleY(1.04) rotate(-5deg)  scaleX(0.99);}
  100%{transform:translateY(0)    scaleY(1)    rotate(-6deg)  scaleX(1);}
}
@keyframes butterflyFloat{
  0%,100%{transform:translateY(0) rotate(-4deg) scaleX(1);}
  25%{transform:translateY(-10px) rotate(-8deg) scaleX(0.85);}
  50%{transform:translateY(-4px)  rotate(-3deg) scaleX(1.1);}
  75%{transform:translateY(6px)   rotate(-6deg) scaleX(0.9);}
}
.placed.sky-butterfly .p-emoji{animation:butterflyFloat 2s ease-in-out infinite!important;font-size:2.2rem;}

/* ANIMAL IMAGE (replaces emoji when img asset exists) */
.p-face img.animal-img{
  width:62px;height:62px;object-fit:contain;display:block;
  background:transparent;border:none;outline:none;
  mix-blend-mode:multiply;
  filter:drop-shadow(2px 6px 7px rgba(0,0,0,0.4));
}
.placed .p-emoji{background:transparent!important;}
.placed .p-face{background:transparent!important;}
.placed.dying .p-emoji .animal-img{filter:grayscale(0.85) drop-shadow(0 0 7px rgba(255,23,68,0.55))!important;}

/* ── SHELTER SCENERY (pre-placed, CSS-drawn) ── */
.placed.shelter{cursor:default;pointer-events:none;z-index:8;}
.placed.shelter::after{display:none!important;}
.placed.shelter .p-label{display:none;}
.placed.shelter .p-remove{display:none!important;}

/* Burrow — sandy mound with dark hole */
.shelter-vis{position:relative;display:block;}
.shelter-vis.burrow-vis{width:78px;height:46px;}
.shelter-vis.burrow-vis::before{
  content:'';position:absolute;bottom:0;left:0;right:0;height:34px;
  background:radial-gradient(ellipse at 50% 90%, #d4a04a 0%, #a06825 55%, #7a4f18 100%);
  border-radius:55% 55% 0 0;
  box-shadow:inset 0 -4px 8px rgba(0,0,0,0.25),0 2px 6px rgba(0,0,0,0.3);
}
.shelter-vis.burrow-vis::after{
  content:'';position:absolute;bottom:10px;left:50%;transform:translateX(-50%);
  width:22px;height:15px;
  background:radial-gradient(ellipse, #080300 30%, #1a0a00 80%);
  border-radius:50%;
  box-shadow:0 3px 8px rgba(0,0,0,0.7),inset 0 1px 3px rgba(0,0,0,0.9);
}

/* Rock shade — boulder with shadow */
.shelter-vis.rock-vis{width:76px;height:52px;}
.shelter-vis.rock-vis::before{
  content:'';position:absolute;bottom:4px;left:50%;transform:translateX(-50%);
  width:64px;height:44px;
  background:radial-gradient(ellipse at 35% 30%, #9a9a9a 0%, #6a6a6a 45%, #3a3a3a 80%);
  border-radius:58% 70% 50% 44% / 60% 55% 45% 40%;
  box-shadow:3px 5px 10px rgba(0,0,0,0.55),inset -4px -4px 8px rgba(0,0,0,0.35);
}
.shelter-vis.rock-vis::after{
  content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);
  width:56px;height:8px;
  background:rgba(0,0,0,0.3);border-radius:50%;filter:blur(4px);
}

/* ── CLASSIFY-IT! floating quiz card ── */
#classifyCard{
  display:none;position:fixed;z-index:70;
  background:linear-gradient(145deg,#060c1a,#0c1728);
  border:2px solid rgba(192,132,252,0.45);border-radius:22px;
  padding:20px 18px 14px;width:310px;
  box-shadow:0 20px 60px rgba(0,0,0,0.85),0 0 28px rgba(192,132,252,0.12);
  animation:popIn 0.36s cubic-bezier(0.34,1.72,0.64,1);
  left:50%;top:50%;transform:translate(-50%,-52%);
}
#classifyCard.show{display:block;}
.cl-title{font-size:0.54rem;font-weight:900;letter-spacing:2.5px;color:var(--purple);text-transform:uppercase;margin-bottom:8px;}
.cl-animal{font-size:2.2rem;text-align:center;margin-bottom:4px;filter:drop-shadow(0 2px 6px rgba(0,0,0,0.6));}
.cl-q{font-family:'Baloo 2',cursive;font-size:1.05rem;color:#d0dcf0;text-align:center;margin-bottom:14px;line-height:1.4;}
.cl-opts{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:12px;}
.cl-opt{border:2px solid;border-radius:14px;padding:12px 8px;text-align:center;font-family:'Baloo 2',cursive;font-size:0.88rem;font-weight:800;cursor:pointer;transition:all 0.18s;line-height:1.3;}
.cl-opt.vert{color:#00e676;border-color:rgba(0,230,118,0.35);background:rgba(0,230,118,0.06);}
.cl-opt.vert:hover{background:rgba(0,230,118,0.14);border-color:#00e676;transform:scale(1.03);}
.cl-opt.inv {color:#ff9100;border-color:rgba(255,145,0,0.35); background:rgba(255,145,0,0.06);}
.cl-opt.inv:hover {background:rgba(255,145,0,0.14);border-color:#ff9100;transform:scale(1.03);}
.cl-fb{text-align:center;font-family:'Baloo 2',cursive;font-size:1.0rem;min-height:30px;margin-bottom:8px;line-height:1.5;color:#4a5a78;display:none;}
.cl-fb.show{display:block;}
.cl-fact{font-size:0.82rem;color:#5a7090;line-height:1.5;text-align:center;margin-bottom:6px;display:none;padding:6px 8px;background:rgba(255,255,255,0.03);border-radius:10px;}
.cl-fact.show{display:block;}
.cl-close{display:none;width:100%;border:none;background:linear-gradient(135deg,#7c3aed,#a855f7);border-radius:13px;padding:10px;font-family:'Baloo 2',cursive;font-size:0.95rem;color:white;cursor:pointer;margin-top:4px;}
.cl-close.show{display:block;}

/* Drinking animation — animal bows head to water */
@keyframes drinkBow{
  0%  {transform:translateY(0)   rotate(0deg);}
  18% {transform:translateY(6px) rotate(18deg);}
  65% {transform:translateY(6px) rotate(18deg);}
  82% {transform:translateY(2px) rotate(6deg);}
  100%{transform:translateY(0)   rotate(0deg);}
}
.placed.drinking .p-emoji{animation:drinkBow 2.4s ease-in-out !important;}
.placed.drinking .p-emoji img.animal-img{animation:drinkBow 2.4s ease-in-out !important;}

/* Water ripple on drop */
@keyframes waterRippleDrop{
  0%  {transform:scale(0.8);opacity:0.9;}
  60% {transform:scale(1.25);opacity:0.4;}
  100%{transform:scale(1.5); opacity:0;}
}
.water-drop-ripple{
  position:absolute;pointer-events:none;z-index:25;
  width:90px;height:36px;border-radius:50%;
  border:2px solid rgba(64,196,255,0.7);
  animation:waterRippleDrop 0.9s ease-out forwards;
  transform-origin:center center;
}

/* Shelter hide/emerge */
@keyframes hideInShelter{0%{transform:scale(1);opacity:1;}80%{transform:scale(0.3);opacity:0.3;}100%{transform:scale(0.05);opacity:0;}}
@keyframes emergeFromShelter{0%{transform:scale(0.05);opacity:0;}20%{transform:scale(0.3);opacity:0.3;}100%{transform:scale(1);opacity:1;}}
.in-shelter .p-emoji{animation:hideInShelter 0.6s ease-in forwards!important;}
.emerging   .p-emoji{animation:emergeFromShelter 0.7s ease-out forwards!important;}

/* WANDER */
.p-face{display:inline-block;transition:transform 0.3s ease;}
.placed .p-label{font-size:0.5rem;font-weight:800;color:#c0d0e8;background:rgba(0,0,0,0.72);border:1px solid rgba(255,255,255,0.09);border-radius:8px;padding:2px 6px;white-space:nowrap;margin-top:2px;opacity:0;transition:opacity 0.2s;backdrop-filter:blur(4px);}
.placed:hover .p-label{opacity:1;}
.placed .p-remove{position:absolute;top:-7px;right:-7px;background:linear-gradient(135deg,#ff1744,#b71c1c);color:white;border:none;border-radius:50%;width:20px;height:20px;font-size:0.72rem;cursor:pointer;display:none;align-items:center;justify-content:center;font-weight:900;z-index:20;box-shadow:0 2px 8px rgba(255,23,68,0.5);}
.placed:hover .p-remove{display:flex;}
.placed.dying .p-emoji{animation:dying 0.48s ease-in-out infinite!important;filter:grayscale(0.85) drop-shadow(0 0 7px rgba(255,23,68,0.55))!important;}
@keyframes dying{0%,100%{transform:rotate(-13deg) scale(0.88)}50%{transform:rotate(13deg) scale(0.88)}}

/* POPUPS */
.float-popup{position:fixed;pointer-events:none;z-index:80;font-family:'Baloo 2',cursive;font-size:0.95rem;padding:7px 16px;border-radius:24px;font-weight:700;animation:floatUp 1.4s ease-out forwards;white-space:nowrap;box-shadow:0 6px 20px rgba(0,0,0,0.5);}
@keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1.08)}100%{opacity:0;transform:translateY(-72px) scale(0.82)}}
.float-popup.good{background:linear-gradient(135deg,#00c853,#00e676);color:#001a0a;}
.float-popup.bad,.float-popup.wrong{background:linear-gradient(135deg,#c62828,#ff1744);color:white;}
.float-popup.info{background:linear-gradient(135deg,#01579b,#0288d1);color:white;}

/* ── BOTTOM PANEL ── */
#bottomPanel{
  position:absolute;bottom:0;left:92px;right:0;
  background:linear-gradient(180deg,rgba(4,6,14,0.92) 0%,rgba(0,0,0,0.98) 100%);
  border-top:1px solid rgba(255,255,255,0.07);
  padding:5px 14px 7px;z-index:25;
  display:flex;flex-direction:column;gap:3px;
  backdrop-filter:blur(16px);
  box-shadow:0 -4px 24px rgba(0,0,0,0.6);
}
#bottomRow{display:flex;align-items:center;gap:10px;}

.ch-fb.right-fb{color:#00e676;font-size:1.1rem;font-weight:700;}

/* DRAG GHOST */

/* CHAIN HINT */
#chainHint{position:absolute;top:10px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.78);border:1px solid rgba(255,215,64,0.18);backdrop-filter:blur(10px);border-radius:20px;padding:5px 14px;font-size:0.62rem;color:#3a4a60;z-index:20;pointer-events:none;white-space:nowrap;transition:opacity 0.5s;}

/* FOOD CHAIN */

const canvas = document.getElementById('bgCanvas');

function resizeCanvas(){
  const w = document.getElementById('canvasWrap');
  canvas.width = w.clientWidth; canvas.height = w.clientHeight;
  rainCanvas.width = w.clientWidth; rainCanvas.height = w.clientHeight;
  drawBg();
}

function drawBg(){
  const b = BIOMES[currentBiome];
  const W = canvas.width, H = canvas.height;
  const season = SEASONS[seasonIdx];
  ctx.clearRect(0,0,W,H);

  // Sky
  const sky = ctx.createLinearGradient(0,0,0,H*.6);
  const isDark = b.sky[0].startsWith('#1a') || b.sky[0].startsWith('#31');
  const cols = b.sky.map(c => season.includes('Monsoon') ? dimColor(c,25) : season.includes('Winter') ? coolColor(c) : c);
  sky.addColorStop(0,cols[0]);
  sky.addColorStop(0.5,cols[1]||cols[0]);
  sky.addColorStop(1,cols[2]||cols[1]||cols[0]);
  ctx.fillStyle = sky; ctx.fillRect(0,0,W,H);

  // Sun / Moon
  if(isDark || season.includes('Winter')){
    const mx=W*.82,my=H*.1;
    const halo=ctx.createRadialGradient(mx,my,4,mx,my,60);
    halo.addColorStop(0,'rgba(220,232,255,0.35)');halo.addColorStop(1,'transparent');
    ctx.fillStyle=halo;ctx.beginPath();ctx.arc(mx,my,60,0,Math.PI*2);ctx.fill();
    const mg = ctx.createRadialGradient(mx-6,my-6,2,mx,my,28);
    mg.addColorStop(0,'#ffffff'); mg.addColorStop(.7,'#e8eeff'); mg.addColorStop(1,'#c7d4f0');
    ctx.fillStyle=mg; ctx.beginPath(); ctx.arc(mx,my,26,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.65)';
    for(let i=0;i<22;i++){const sx=(W*.04+i*W*.047)%W,sy=(H*.04+i*i*7)%(H*.42);ctx.beginPath();ctx.arc(sx,sy,i%3?0.9:1.6,0,Math.PI*2);ctx.fill();}
  } else {
    const sx = season.includes('Monsoon')?W*.5:W*.8;
    const sy = H*.12;
    const sr = season.includes('Monsoon')?22:48;
    // soft rays
    if(!season.includes('Monsoon')){
      ctx.save();ctx.translate(sx,sy);ctx.fillStyle='rgba(255,236,150,0.12)';
      for(let i=0;i<12;i++){ctx.rotate(Math.PI/6);ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(-14,sr*2.6);ctx.lineTo(14,sr*2.6);ctx.closePath();ctx.fill();}
      ctx.restore();
    }
    const sg = ctx.createRadialGradient(sx,sy,2,sx,sy,sr);
    sg.addColorStop(0,'#fffde7'); sg.addColorStop(.5,'#ffe082'); sg.addColorStop(1,'transparent');
    ctx.fillStyle=sg; ctx.beginPath(); ctx.arc(sx,sy,sr,0,Math.PI*2); ctx.fill();
  }

  // Clouds for daytime skies
  if(!isDark && !season.includes('Winter')){
    drawClouds(W,H,season.includes('Monsoon'));
  }

  const fn = {dunes:drawDunes,mangrove:drawMangrove,mountains:drawMountains,forest:drawForest,plains:drawPlains};
  (fn[b.extras]||drawPlains)(W,H,b,season);
}

function drawClouds(W,H,storm){
  const col=storm?'rgba(70,80,95,0.7)':'rgba(255,255,255,0.6)';
  const clouds=storm?[[W*.18,H*.14],[W*.46,H*.09],[W*.72,H*.16],[W*.9,H*.22]]:[[W*.22,H*.16],[W*.62,H*.1]];
  clouds.forEach(([cx,cy])=>{
    ctx.fillStyle=col;
    ctx.beginPath();
    ctx.ellipse(cx,cy,40,16,0,0,Math.PI*2);
    ctx.ellipse(cx+32,cy+5,30,13,0,0,Math.PI*2);
    ctx.ellipse(cx-30,cy+6,26,12,0,0,Math.PI*2);
    ctx.ellipse(cx+4,cy-7,24,12,0,0,Math.PI*2);
    ctx.fill();
  });
}

function dimColor(hex,amt){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),bl=parseInt(hex.slice(5,7),16);
  const c=v=>Math.max(0,Math.min(255,v));
  return `rgb(${c(r-amt)},${c(g-amt)},${c(bl+amt/2)})`;
}
function coolColor(hex){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),bl=parseInt(hex.slice(5,7),16);
  const c=v=>Math.max(0,Math.min(255,v));
  return `rgb(${c(r-20)},${c(g-10)},${c(bl+25)})`;
}

function drawDunes(W,H,b,season){
  const g=season.includes('Monsoon')?['#b08020','#8a6018','#706010']:b.ground;
  function dune(y0,y1,col,a){
    ctx.globalAlpha=a;ctx.fillStyle=col;ctx.beginPath();ctx.moveTo(0,H);ctx.lineTo(0,H*y0);
    ctx.bezierCurveTo(W*.25,H*(y0-.12),W*.5,H*(y1+.08),W*.75,H*(y0-.05));
    ctx.bezierCurveTo(W*.88,H*(y0-.1),W,H*y1,W,H*y1);
    ctx.lineTo(W,H);ctx.closePath();ctx.fill();ctx.globalAlpha=1;
  }
  dune(.55,.5,g[0],.5);dune(.65,.6,g[1],.75);dune(.78,.72,g[2],1);
  ctx.fillStyle='#a06010';ctx.fillRect(0,H*.82,W,H*.18);
  ctx.strokeStyle='rgba(255,255,255,0.1)';ctx.lineWidth=1.2;
  for(let i=0;i<3;i++){const y=H*(.85+i*.04);ctx.beginPath();ctx.moveTo(0,y);ctx.bezierCurveTo(W*.3,y-4,W*.6,y+3,W,y-2);ctx.stroke();}
}

function drawMangrove(W,H){
  const gc=ctx.createLinearGradient(0,H*.45,0,H);
  gc.addColorStop(0,'#1b5e20');gc.addColorStop(.5,'#2e7d32');gc.addColorStop(1,'#1a3a1a');
  ctx.fillStyle=gc;ctx.fillRect(0,H*.45,W,H*.55);
  ctx.fillStyle='rgba(2,136,209,0.4)';ctx.fillRect(0,H*.68,W,H*.14);
  ctx.strokeStyle='#4e2a0a';ctx.lineWidth=2.5;
  [W*.12,W*.32,W*.52,W*.72,W*.9].forEach(rx=>{
    ctx.beginPath();ctx.moveTo(rx,H*.48);ctx.bezierCurveTo(rx-28,H*.63,rx+28,H*.63,rx+18,H*.77);ctx.stroke();
    ctx.beginPath();ctx.moveTo(rx,H*.48);ctx.bezierCurveTo(rx+22,H*.58,rx-18,H*.66,rx-14,H*.77);ctx.stroke();
  });
  ctx.fillStyle='rgba(27,94,32,0.55)';
  [[W*.18,H*.33,115,50],[W*.55,H*.28,95,42],[W*.88,H*.36,75,38]].forEach(([cx,cy,rx,ry])=>{ctx.beginPath();ctx.ellipse(cx,cy,rx,ry,0,0,Math.PI*2);ctx.fill();});
}

function drawMountains(W,H,b,season){
  ctx.fillStyle='#37474f';ctx.fillRect(0,H*.58,W,H*.42);
  const peaks=[{x:W*.08,h:H*.65},{x:W*.3,h:H*.42},{x:W*.54,h:H*.33},{x:W*.76,h:H*.48},{x:W*.93,h:H*.6}];
  peaks.forEach(p=>{
    const pw=W*.22;
    ctx.fillStyle='#546e7a';ctx.beginPath();ctx.moveTo(p.x-pw/2,H*.9);ctx.lineTo(p.x,p.h);ctx.lineTo(p.x+pw/2,H*.9);ctx.closePath();ctx.fill();
    const sh=(H*.9-p.h)*.3;
    ctx.fillStyle=season.includes('Winter')?'rgba(230,240,255,0.92)':'rgba(230,240,255,0.62)';
    ctx.beginPath();ctx.moveTo(p.x,p.h);ctx.lineTo(p.x-pw*.18,p.h+sh);ctx.lineTo(p.x+pw*.18,p.h+sh);ctx.closePath();ctx.fill();
  });
}

function drawForest(W,H,b,season){
  const gc=ctx.createLinearGradient(0,H*.48,0,H);
  gc.addColorStop(0,'#4e342e');gc.addColorStop(1,'#3e2723');
  ctx.fillStyle=gc;ctx.fillRect(0,H*.48,W,H*.52);
  ctx.fillStyle='rgba(27,94,32,0.52)';
  [W*.06,W*.2,W*.4,W*.6,W*.78,W*.93].forEach((tx,i)=>{
    ctx.beginPath();ctx.ellipse(tx,H*.36+i%3*H*.05,48+i%2*30,(H*.36+i%3*H*.05)*.28,0,0,Math.PI*2);ctx.fill();
  });
  ctx.fillStyle='rgba(78,52,46,0.8)';ctx.fillRect(0,H*.8,W,H*.2);
}

function drawPlains(W,H,b,season){
  const gc=ctx.createLinearGradient(0,H*.5,0,H);
  gc.addColorStop(0,season.includes('Monsoon')?'#7cb342':'#558b2f');
  gc.addColorStop(.5,'#558b2f');gc.addColorStop(1,'#33691e');
  ctx.fillStyle=gc;ctx.fillRect(0,H*.5,W,H*.5);
  ctx.strokeStyle='rgba(255,255,255,0.09)';ctx.lineWidth=1.4;
  for(let i=0;i<5;i++){const y=H*(.56+i*.07);ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  ctx.fillStyle='rgba(51,105,30,0.45)';
  for(let x=0;x<W;x+=W/9){ctx.beginPath();ctx.ellipse(x+W/18,H*.51,22,17,0,0,Math.PI*2);ctx.fill();}
}

function startRain(){
  rainCanvas.style.display='block';
  rainDrops=[];
  for(let i=0;i<80;i++) rainDrops.push({x:Math.random()*rainCanvas.width,y:Math.random()*rainCanvas.height,s:4+Math.random()*6,l:8+Math.random()*10});
  (function loop(){
    rainCtx.clearRect(0,0,rainCanvas.width,rainCanvas.height);
    rainCtx.strokeStyle='rgba(110,170,255,0.32)';rainCtx.lineWidth=1;
    rainDrops.forEach(d=>{
      rainCtx.beginPath();rainCtx.moveTo(d.x,d.y);rainCtx.lineTo(d.x-1.5,d.y+d.l);rainCtx.stroke();
      d.y+=d.s;d.x-=0.4;
      if(d.y>rainCanvas.height){d.y=-d.l;d.x=Math.random()*rainCanvas.width;}
    });
    rainAnim=requestAnimationFrame(loop);
  })();
}
function stopRain(){
  cancelAnimationFrame(rainAnim);
  rainCanvas.style.display='none';
}

let dragging=null;

function getWaterStyle(id){
  const map={
    oasis:  'radial-gradient(ellipse at 50% 32%, #a7ffeb, #00bcd4 52%, #006978)',
    river:  'radial-gradient(ellipse at 50% 32%, #81d4fa, #0288d1 52%, #01579b)',
    pond:   'radial-gradient(ellipse at 50% 32%, #b2dfdb, #26a69a 52%, #00564d)',
    glacier:'radial-gradient(ellipse at 50% 32%, #ffffff, #b3e5fc 50%, #4fc3f7)',
    stream: 'radial-gradient(ellipse at 50% 32%, #b3e5fc, #039be5 52%, #01579b)',
  };
  return map[id]||map.river;
}

function dropItem(itemId,x,y){
  const items=BIOMES[currentBiome].items;
  const info=items[itemId]; if(!info)return;
  const uid='u'+(uidCounter++);
  const dh=dropZone.clientHeight, dw=dropZone.clientWidth;
  const minY=dh*(HORIZON[currentBiome]||0.5);
  const isSky=info.sky===true;
  const skyTried = !isSky && y < minY-4;
  const cx=Math.min(Math.max(x,25),dw-65);
  let cy;
  if(isSky){
    // sky creature: clamp to sky band (top 10px → HORIZON-50px), default to middle-sky if dropped on ground
    const skyMax=minY-55;
    cy=Math.min(Math.max(y,20), skyMax);
    if(y>=minY) cy=20+Math.random()*(skyMax-20); // dropped on ground → auto-place in sky
  } else {
    cy=Math.min(Math.max(y,minY),dh-80);
  }
  const el=document.createElement('div');
  const extraClass=isSky?(itemId==='butterfly'?'sky-butterfly':'sky-creature'):'';
  el.className='placed '+info.type+(extraClass?' '+extraClass:''); el.id=uid;
  el.style.left=cx+'px'; el.style.top=cy+'px';
  if(info.type==='shelter'){
    el.innerHTML=`<button class="p-remove" onclick="removeItem('${uid}')">✕</button><span class="p-emoji">${info.emoji}</span><span class="p-label">${info.label}</span>`;
    el.addEventListener('click',e=>{if(!e.target.classList.contains('p-remove')) showFloat(`🏠 Shelter for: ${(info.shelterFor||[]).join(', ')}`,cx+50,cy,'info');});
  } else if(info.type==='water'){
    el.innerHTML=`<button class="p-remove" onclick="removeItem('${uid}')">✕</button><div class="water-pool" style="background:${getWaterStyle(itemId)};"><span class="wp-emoji">${info.emoji}</span></div><span class="p-label">${info.label}</span>`;
    // Water splash SFX + visual ripple
    sfxSplash();
    const ripple=document.createElement('div'); ripple.className='water-drop-ripple';
    ripple.style.left=(cx+5)+'px'; ripple.style.top=(cy+20)+'px';
    dropZone.appendChild(ripple); setTimeout(()=>ripple.remove(),950);
    // Trigger drinking animation after 1.5s
    setTimeout(()=>triggerDrinking(cx,cy),1500);
  } else if(info.type==='plant'){
    el.innerHTML=`<button class="p-remove" onclick="removeItem('${uid}')">✕</button><div class="grow-beam"></div><span class="p-emoji seedling">🌱</span><span class="p-label">${info.label}</span>`;
    setTimeout(()=>{
      const em=el.querySelector('.p-emoji'); const bm=el.querySelector('.grow-beam');
      if(bm) bm.remove();
      if(em){ em.textContent=info.emoji; em.classList.remove('seedling'); em.style.animation=''; em.classList.add('grown');
        setTimeout(()=>{ if(em) em.style.animationName='plantSway'; },650); }
    },4000);
  } else {
    const faceInner = info.img
      ? `<img src="${info.img}" alt="${info.label}" class="animal-img" draggable="false">`
      : info.emoji;
    el.innerHTML=`<button class="p-remove" onclick="removeItem('${uid}')">✕</button><span class="p-emoji"><span class="p-face">${faceInner}</span></span><span class="p-label">${info.label}</span>`;
    if(!isSky) el.querySelector('.p-emoji').style.animationDelay=(Math.random()*1.5)+'s';
  }
  if(info.type!=='shelter') el.addEventListener('click',e=>{if(!e.target.classList.contains('p-remove')) showFoodChain(uid,itemId);});
  dropZone.appendChild(el);
  placed.push({id:itemId,uid,el,x:cx,y:cy});
  const floatMsg = info.type==='shelter' ? `🏠 ${info.label} placed!` : isSky?'🦅 Soaring!':skyTried?'🌍 On the ground!':'+10';
  addScore(info.type==='shelter'?5:10);
  showFloat(floatMsg,cx+60,cy+40,info.type==='shelter'?'info':isSky?'info':skyTried?'info':'good');
  if(info.type!=='water') sfxPlace();
  if(!hintHidden){hintHidden=true;document.getElementById('chainHint').style.opacity='0';}
  updateEcosystem(); checkChallenge(itemId);
  if(info.v!==undefined && !classifiedAnimals.has(itemId) && Math.random()<0.7){
    setTimeout(()=>showClassifyQuiz(itemId), 800);
  }
}

function removeItem(uid){
  const i=placed.findIndex(p=>p.uid===uid); if(i===-1)return;
  placed[i].el.remove(); placed.splice(i,1); sfxRemove(); updateEcosystem();
}

function clearAll(){
  placed.forEach(p=>p.el.remove()); placed=[]; winShown=false; hintHidden=false;
  document.getElementById('chainHint').style.opacity='1';

}

function placeShelters(){
  const b=BIOMES[currentBiome];
  if(!b.shelterDefs||!b.shelterDefs.length) return;
  const dw=dropZone.clientWidth, dh=dropZone.clientHeight; if(!dw||!dh) return;
  const yL=dh*(HORIZON[currentBiome]||0.5)+dh*0.05;
  b.shelterDefs.forEach(sd=>{
    const info=b.items[sd.id]; if(!info) return;
    const uid='u'+(uidCounter++);
    const cx=Math.round(dw*sd.xFrac);
    const el=document.createElement('div');
    el.className='placed shelter'; el.id=uid;
    el.style.left=cx+'px'; el.style.top=yL+'px';
    const visClass=sd.id==='burrow'?'burrow-vis':'rock-vis';
    el.innerHTML=`<div class="shelter-vis ${visClass}"></div>`;
    // tooltip on click
    el.style.pointerEvents='auto';
    el.addEventListener('click',()=>showFloat(`🏠 ${sd.label} — animals rest here!`,cx+40,yL,'info'));
    dropZone.appendChild(el);
    placed.push({id:sd.id,uid,el,x:cx,y:yL,preset:true});
  });
}

// ── ECOSYSTEM ENGINE ──────────────────────────────────────────
function updateEcosystem(){
  const b=BIOMES[currentBiome]; const items=b.items;
  const counts={}; Object.keys(items).forEach(k=>counts[k]=placed.filter(p=>p.id===k).length);
  const total=placed.filter(p=>items[p.id]&&items[p.id].type!=='shelter').length; const season=SEASONS[seasonIdx];
  const warnings=[]; let dying=[];

  // 'water' = any water source present; 'grass' = any plant present; else a specific item id
  const hasWater = b.waterIds.some(w=>counts[w]>0);
  const hasPlant = b.plantIds.some(p=>counts[p]>0);
  const needMet = n => n==='water'?hasWater : n==='grass'?hasPlant : counts[n]>0;
  const needEmoji = n => n==='water'?'💧' : n==='grass'?'🌿' : (items[n]?items[n].emoji:n);

  placed.forEach(p=>{
    const info=items[p.id]; if(!info)return;
    let needy=false;
    (info.needs||[]).forEach(n=>{
      if(!needMet(n)){needy=true; warnings.push(`${info.emoji} ${info.label} needs ${needEmoji(n)}!`);}
    });
    if(info.eats&&info.eats.length>0&&info.type!=='plant'&&info.type!=='water'){
      if(!info.eats.some(f=>counts[f]>0)){warnings.push(`${info.emoji} ${info.label} has nothing to eat! 😢`);needy=true;}
    }
    if(needy) dying.push(p.uid);
  });

  Object.entries(counts).forEach(([id,cnt])=>{
    const info=items[id]; if(!info)return;
    if(cnt>=3&&info.type==='predator') warnings.push(`Too many ${info.emoji} — prey will disappear!`);
    if(cnt>=4&&info.type==='herbivore') warnings.push(`Too many ${info.emoji} — they'll eat all plants!`);
  });

  const uniq=[...new Set(warnings)];

  placed.forEach(p=>{
    const info=items[p.id]; if(!info)return;
    const em=p.el.querySelector('.p-emoji');
    if(!em)return; // water pools have no .p-emoji and never die
    p.el.classList.remove('dying');
    em.style.filter='drop-shadow(1px 4px 5px rgba(0,0,0,0.55))';
    if(dying.includes(p.uid)){p.el.classList.add('dying');}
    else{em.style.animationName=info.type==='plant'?'plantSway':'idleFloat';}
  });

  // Balance — a real food web needs DIVERSITY at each level, everyone fed, and size.
  const nPlants      = b.plantIds.filter(p=>counts[p]>0).length;   // distinct plant species
  const nHerbs       = b.herbIds.filter(h=>counts[h]>0).length;    // distinct herbivore species
  const nPreds       = b.predIds.filter(p=>counts[p]>0).length;    // distinct predator species
  const nAnimals     = placed.filter(p=>{const t=items[p.id]&&items[p.id].type;return t&&t!=='plant'&&t!=='water'&&t!=='shelter';}).length;
  const allFed       = nAnimals>0 && dying.length===0;             // sustainability
  let bal=0;
  if(total>0){
    if(hasWater) bal+=20;
    bal += Math.min(nPlants,3)*15;  // max 45
    bal += Math.min(nHerbs,3)*10;   // max 30
    bal += Math.min(nPreds,2)*8;    // max 16
    if(allFed) bal+=12;
    if(total>=8)  bal+=5;
    if(season.includes('Monsoon')&&hasWater) bal+=5;
    if(season.includes('Winter')&&['bear','elephant'].some(a=>counts[a]>0)) bal+=4;
    if(!allFed) bal -= Math.min(dying.length*8, 30);
    bal=Math.max(0,Math.min(100,bal));
  }

  const fill=document.getElementById('balFill'); const bt=document.getElementById('balText');
  fill.style.width=bal+'%';
  fill.classList.toggle('live',bal>0);
  if(bal===0){fill.style.background='#1a2030';bt.textContent='Empty — add some life!';}
  else if(bal<30){fill.style.background='linear-gradient(90deg,#b71c1c,#ff1744)';bt.textContent='Struggling ⚠️';}
  else if(bal<60){fill.style.background='linear-gradient(90deg,#e65100,#ff9100)';bt.textContent='Getting better 🌱';}
  else if(bal<85){fill.style.background='linear-gradient(90deg,#2e7d32,#00e676)';bt.textContent='Almost there! 🌿';}
  else{fill.style.background='linear-gradient(90deg,#00c853,#69f0ae)';bt.textContent='BALANCED! 🏆';}

  const feed=document.getElementById('feedMsg');
  if(total===0) feed.innerHTML='Start by adding <strong>plants 🌿</strong> and <strong>water 💧</strong>!';
  else if(uniq.length>0) feed.innerHTML='⚠️ '+uniq.slice(0,2).map(w=>`<strong>${w}</strong>`).join(' &nbsp;|&nbsp; ');
  else{
    const facts=(b.positiveFacts||[]).filter(f=>f.needs.every(n=>counts[n]>0));
    feed.innerHTML=facts.length>0?'✅ '+facts[Math.floor(Math.random()*facts.length)].msg:'🌿 Great start! Add more variety to balance the ecosystem.';
  }

  // Pop display
  const pd=document.getElementById('popDisplay'); pd.innerHTML='';
  Object.entries(counts).filter(([,v])=>v>0).forEach(([id,cnt])=>{
    const info=items[id]; if(!info||info.type==='shelter')return;
    const r=document.createElement('div'); r.className='pop-row';
    r.innerHTML=`${info.emoji} <span>${cnt}</span>`; pd.appendChild(r);
  });

  maybeGroupChallenge(counts);

  // WIN: a real food web — diversity at every trophic level, everyone fed, enough variety.
  const balancedWeb = bal>=75 && total>=8 && nPlants>=2 && nHerbs>=2 && nPreds>=1 && allFed;
  if(balancedWeb&&!winShown){winShown=true;addScore(200);setTimeout(showWin,1200);}

  updateWinHints(hasWater,nPlants,nHerbs,nPreds,total,allFed);
}

// ── FOOD CHAIN VISUALISER ─────────────────────────────────────
let chainTimer=null;
function showFoodChain(uid,itemId){
  const items=BIOMES[currentBiome].items;
  const info=items[itemId]; if(!info||info.type==='plant'||info.type==='water')return;
  const src=placed.find(p=>p.uid===uid); if(!src)return;
  const svg=document.getElementById('chainSvg'); svg.innerHTML='';
  const overlay=document.getElementById('chainOverlay');
  const sc={x:src.x+20,y:src.y+20};
  const lines=[];

  placed.forEach(t=>{
    if(t.uid===uid)return;
    const ti=items[t.id]; if(!ti)return;
    const tc={x:t.x+20,y:t.y+20};
    let color=null,rel=null;
    if((info.eats||[]).includes(t.id)){color='#ef5350';rel=`${info.emoji} ${info.label} eats ${ti.emoji} ${ti.label}`;}
    else if((info.eatenBy||[]).includes(t.id)){color='#42a5f5';rel=`${ti.emoji} ${ti.label} eats ${info.emoji} ${info.label}`;}
    if(!color)return;
    const mid=`M${sc.x},${sc.y} Q${(sc.x+tc.x)/2},${Math.min(sc.y,tc.y)-35} ${tc.x},${tc.y}`;
    const mid2=`${(sc.x+tc.x)/2},${Math.min(sc.y,tc.y)-35}`;
    const mId='mk'+Math.random().toString(36).slice(2,8);
    svg.innerHTML+=`<defs><marker id="${mId}" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto"><polygon points="0 0,7 3.5,0 7" fill="${color}"/></marker></defs>
      <path d="${mid}" stroke="${color}" stroke-width="2.2" fill="none" stroke-dasharray="5,3" marker-end="url(#${mId})" opacity="0.85"/>`;
    if(rel) lines.push(rel);
  });

  const tip=document.getElementById('chainTooltip');
  tip.innerHTML=lines.length?lines.join('<br>'):`${info.emoji} ${info.label} — tap others to see connections`;
  const rect=dropZone.getBoundingClientRect();
  tip.style.left=Math.min(rect.left+sc.x+40,window.innerWidth-220)+'px';
  tip.style.top=Math.max(rect.top+sc.y-30,50)+'px';
  tip.classList.add('show'); overlay.classList.add('show');
  clearTimeout(chainTimer);
  chainTimer=setTimeout(()=>{overlay.classList.remove('show');tip.classList.remove('show');},2500);
}

  document.getElementById('ch-fb').textContent='';
  document.getElementById('ch-btn').style.display='none';
  const oe=document.getElementById('ch-opts'); oe.innerHTML='';
  ch.opts.forEach((o,i)=>{
    const btn=document.createElement('button'); btn.className='ch-opt'; btn.textContent=o;
    btn.onclick=()=>{
      oe.querySelectorAll('.ch-opt').forEach(b=>b.onclick=null);
      const fb=document.getElementById('ch-fb');
      oe.querySelectorAll('.ch-opt')[ch.correct].classList.add('correct');

      else{btn.classList.add('wrong');fb.innerHTML='❌ Not quite! '+ch.explain;fb.style.color='#ef9a9a';sfxWrong();}
      document.getElementById('ch-btn').style.display='block';
    };

function checkChallenge(itemId){
  const ch=BIOMES[currentBiome].challenges.find(c=>c.trigger===itemId);
  if(!ch)return;
  const key=currentBiome+'_'+itemId;
  if(challengesDone.has(key))return;
  challengesDone.add(key);
  setTimeout(()=>showQuiz(ch),800);
}

// Group / collective-noun challenge: fires once when a species reaches 3+ on the canvas.
function maybeGroupChallenge(counts){
  if(document.getElementById('challengeOverlay').classList.contains('show')) return; // wait for free modal
  for(const id in counts){
    if(counts[id]>=3 && GROUPS[id] && !groupsDone.has(id)){
      groupsDone.add(id);
      const g=GROUPS[id];
      setTimeout(()=>showQuiz({type:'GROUP',q:g.q,opts:g.opts,correct:g.correct,explain:g.fact,reward:40}),600);
      return; // one at a time
    }
  }
}

// ── CONFETTI ─────────────────────────────────────────────────
let confettiRaf=null;
function startConfetti(){
  const cv=document.getElementById('confettiCanvas');
  if(!cv)return;
  cv.width=window.innerWidth; cv.height=window.innerHeight;
  const ctx=cv.getContext('2d');
  const COLS=['#ffd740','#ff9100','#00e676','#40c4ff','#c084fc','#ff1744','#26c6da','#f5a623'];
  const pts=Array.from({length:130},()=>({
    x:Math.random()*cv.width, y:-20-Math.random()*120,
    w:5+Math.random()*9, h:7+Math.random()*6,
    col:COLS[Math.floor(Math.random()*COLS.length)],
    rot:Math.random()*360, vx:(Math.random()-0.5)*4,
    vy:2.2+Math.random()*4.5, vr:(Math.random()-0.5)*9,
  }));
  let frame=0;
  function tick(){
    frame++;
    ctx.clearRect(0,0,cv.width,cv.height);
    pts.forEach(p=>{
      p.x+=p.vx; p.y+=p.vy; p.rot+=p.vr; p.vy+=0.04;
      ctx.save();
      ctx.translate(p.x,p.y); ctx.rotate(p.rot*Math.PI/180);
      ctx.fillStyle=p.col; ctx.globalAlpha=Math.max(0,1-frame/280);
      ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
      ctx.restore();
      if(p.y>cv.height+20&&frame<200){p.y=-20;p.x=Math.random()*cv.width;p.vy=2.2+Math.random()*4.5;}
    });
    if(frame<380) confettiRaf=requestAnimationFrame(tick);
    else ctx.clearRect(0,0,cv.width,cv.height);
  }
  if(confettiRaf) cancelAnimationFrame(confettiRaf);
  confettiRaf=requestAnimationFrame(tick);
}

function updateWinHints(hasWater,nPlants,nHerbs,nPreds,total,allFed){
  const el=document.getElementById('winHints'); if(!el)return;
  const h=(ok,txt)=>`<span class="${ok?'hint-ok':'hint-no'}">${ok?'✅':'❌'} ${txt}</span>`;
  el.innerHTML=[
    h(hasWater,'Water'),
    h(nPlants>=2,`${nPlants}/2 Plants`),
    h(nHerbs>=2,`${nHerbs}/2 Herbivores`),
    h(nPreds>=1,'Predator'),
    h(total>=8,`${total}/8 Items`),
    h(allFed,'All fed'),
  ].join('');
}

function updateBiomePills(){
  document.querySelectorAll('.biome-pill').forEach(p=>{
    const biome=p.dataset.biome;
    const locked=!unlockedBiomes.has(biome);
    p.classList.toggle('locked',locked);
    p.disabled=locked;
    const b=BIOMES[biome];
    const done=completedBiomes.has(biome);
    p.textContent=locked?`🔒 ${b.name}`:(done?`✅ ${b.emoji} ${b.name}`:`${b.emoji} ${b.name}`);

}

function showWin(){
  const b=BIOMES[currentBiome];
  completedBiomes.add(currentBiome);
  const idx=BIOME_ORDER.indexOf(currentBiome);

    unlockedBiomes.add(nextBiome);

    nextMsg=`<br><br>🎉 <strong>${BIOMES[nextBiome].name}</strong> biome unlocked!`;

    nextMsg='<br><br>🌏 You\'ve completed ALL 5 biomes! Master Ecologist! 🏅';
  }
  const ecoCount=placed.filter(p=>BIOMES[currentBiome].items[p.id]&&BIOMES[currentBiome].items[p.id].type!=='shelter').length;
  document.getElementById('winSub').innerHTML=`You built a balanced <strong>${b.name}</strong> ecosystem with ${ecoCount} elements!<br>Final Score: <strong style="color:#ffd700">⭐ ${score} pts</strong>${nextMsg}`;
  document.getElementById('winScreen').classList.add('show'); sfxWin();
  updateBiomePills(); startConfetti();

// ── AUDIO (synthesised, no external files) ────────────────────
let audioCtx=null, soundOn=true;
function initAudio(){
  if(!audioCtx){ try{ audioCtx=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){ return; } }
  if(audioCtx.state==='suspended') audioCtx.resume();
}
function toggleSound(){
  soundOn=!soundOn;
  document.getElementById('soundBtn').textContent=soundOn?'🔊':'🔇';
  if(soundOn){ initAudio(); blip(660,0.12,'sine',0.15); }
}
function blip(freq,dur,type,vol,when){
  if(!soundOn||!audioCtx)return;
  const t0=audioCtx.currentTime+(when||0);
  const o=audioCtx.createOscillator(), g=audioCtx.createGain();
  o.type=type||'sine'; o.frequency.value=freq;
  g.gain.setValueAtTime(0.0001,t0);
  g.gain.exponentialRampToValueAtTime(vol||0.15,t0+0.02);
  g.gain.exponentialRampToValueAtTime(0.0001,t0+dur);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(t0); o.stop(t0+dur+0.03);
}
function sfxPlace(){ initAudio(); blip(440,0.12,'sine',0.18); blip(660,0.10,'sine',0.12,0.05); }
function sfxRemove(){ initAudio(); blip(320,0.12,'sine',0.13); blip(200,0.12,'sine',0.10,0.05); }
function sfxCorrect(){ initAudio(); [523,659,784,1047].forEach((f,i)=>blip(f,0.18,'triangle',0.16,i*0.08)); }
function sfxWrong(){ initAudio(); blip(190,0.26,'sawtooth',0.13); blip(150,0.30,'sawtooth',0.11,0.07); }
function sfxWin(){ initAudio(); [523,659,784,1047,1319,1047,1319].forEach((f,i)=>blip(f,0.32,'triangle',0.18,i*0.13)); }
function sfxRank(){ initAudio(); [784,1047,1319].forEach((f,i)=>blip(f,0.22,'sine',0.16,i*0.07)); }

function sfxSplash(){
  initAudio(); if(!soundOn||!audioCtx) return;
  // White-noise burst through resonant bandpass — water splash
  const dur=0.55, t0=audioCtx.currentTime;
  const buf=audioCtx.createBuffer(1,audioCtx.sampleRate*dur,audioCtx.sampleRate);
  const d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1);
  const src=audioCtx.createBufferSource();
  src.buffer=buf;
  const bp=audioCtx.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=1400; bp.Q.value=0.6;
  const g=audioCtx.createGain();
  g.gain.setValueAtTime(0.0001,t0);
  g.gain.exponentialRampToValueAtTime(0.28,t0+0.02);
  g.gain.exponentialRampToValueAtTime(0.0001,t0+dur);
  src.connect(bp); bp.connect(g); g.connect(audioCtx.destination);
  src.start(t0); src.stop(t0+dur+0.05);
  // Extra drip tones
  [660,880,520].forEach((f,i)=>blip(f,0.09,'sine',0.08,0.04+i*0.07));
}

function sfxShelter(){
  initAudio(); blip(350,0.14,'sine',0.1); blip(280,0.18,'sine',0.08,0.06);
}

function answerClassify(guessVert){
  if(!classifyTarget) return;
  const {id,info}=classifyTarget;
  const correct=info.v===guessVert;
  const fb=document.getElementById('clFb');
  const fact=document.getElementById('clFact');
  const cls=document.getElementById('clClose');
  if(correct){
    fb.className='cl-fb show right-fb';
    fb.textContent='✅ Correct! Well done!';
    const vertFact=info.v?`${info.emoji} ${info.label} has a backbone — it's a ${info.type==='predator'?'reptile/mammal/bird':'mammal/bird/reptile'}! 🦴`:`${info.emoji} ${info.label} has NO backbone — it's an invertebrate! 🪱`;
    fact.className='cl-fact show';
    fact.textContent=vertFact;
    addScore(15); sfxCorrect();
    classifiedAnimals.add(id);
  } else {
    fb.className='cl-fb show wrong-fb';
    fb.textContent=`❌ Not quite! It's actually a ${info.v?'Vertebrate 🦴':'Invertebrate 🪱'}`;
    const explain=info.v
      ? `${info.emoji} ${info.label} has a spine (backbone) inside its body — that makes it a vertebrate!`
      : `${info.emoji} ${info.label} has no bones at all — it's an invertebrate!`;
    fact.className='cl-fact show';
    fact.textContent=explain;
    sfxWrong();
  }
  cls.className='cl-close show';
  // Disable buttons after answer
  document.querySelectorAll('.cl-opt').forEach(b=>b.style.pointerEvents='none');
}

function closeClassify(){
  document.getElementById('classifyCard').className='';
  document.querySelectorAll('.cl-opt').forEach(b=>b.style.pointerEvents='');
  classifyTarget=null;
}

function triggerDrinking(waterX, waterY){
  const items=BIOMES[currentBiome].items;
  // Find a nearby ground herbivore/omnivore
  const candidates=placed.filter(p=>{
    const inf=items[p.id]; if(!inf) return false;
    return (inf.type==='herbivore'||inf.type==='omnivore') && !inf.sky && !p.el.classList.contains('dying');
  });
  if(!candidates.length) return;
  // Pick closest
  const drinker=candidates.reduce((a,b)=>Math.abs(a.x-waterX)<Math.abs(b.x-waterX)?a:b);
  const origX=drinker.x;
  const targetX=waterX-10;
  const dur=Math.max(1.0, Math.abs(targetX-origX)/60);
  // Walk to water
  drinker.el.style.transition=`left ${dur}s linear`;
  const face=drinker.el.querySelector('.p-face');
  if(face) face.style.transform=`scaleX(${targetX<origX?-1:1})`;
  drinker.el.style.left=targetX+'px';
  drinker.x=targetX;
  // Drink
  setTimeout(()=>{
    drinker.el.classList.add('drinking');
    showFloat('💧 Drinking!',targetX+50,waterY-30,'info');
    // sip sounds
    blip(440,0.06,'sine',0.06); setTimeout(()=>blip(400,0.06,'sine',0.05),300); setTimeout(()=>blip(360,0.06,'sine',0.04),600);
    // Walk back
    setTimeout(()=>{
      drinker.el.classList.remove('drinking');
      drinker.el.style.transition=`left ${dur}s linear`;
      if(face) face.style.transform=`scaleX(${origX<targetX?-1:1})`;
      drinker.el.style.left=origX+'px'; drinker.x=origX;
    },2600);
  }, dur*1000+100);
}

// ── ANIMAL WANDERING ──────────────────────────────────────────
// Animals stroll back & forth along the ground and flip to face their direction.
function wanderTick(){
  const items=BIOMES[currentBiome].items;
  const dw=dropZone.clientWidth, dh=dropZone.clientHeight; if(!dw) return;
  const minY=dh*(HORIZON[currentBiome]||0.5);
  // Shelters: occasionally send matching animals to hide
  const shelters=placed.filter(p=>items[p.id]&&items[p.id].type==='shelter');
  placed.forEach(p=>{
    const info=items[p.id]; if(!info) return;
    if(info.type==='plant'||info.type==='water'||info.type==='shelter') return;
    if(p.el.classList.contains('dying')||p.el.classList.contains('in-shelter')||p.el.classList.contains('emerging')) return;
    if(Math.random()<0.4) return;
    // 12% chance: head to matching shelter
    if(Math.random()<0.12 && shelters.length){
      const matching=shelters.filter(s=>(items[s.id].shelterFor||[]).includes(p.id));
      if(matching.length){
        const sh=matching[Math.floor(Math.random()*matching.length)];
        const dur=Math.max(1.2,Math.abs(sh.x-p.x)/45);
        p.el.style.transition=`left ${dur}s linear`;
        const face=p.el.querySelector('.p-face');
        if(face) face.style.transform=`scaleX(${sh.x<p.x?-1:1})`;
        p.el.style.left=sh.x+'px'; p.x=sh.x;
        // Hide in shelter after arriving
        setTimeout(()=>{
          p.el.classList.add('in-shelter');
          sfxShelter();
          // Emerge after 3–5s
          const hideTime=3000+Math.random()*2000;
          setTimeout(()=>{
            p.el.classList.remove('in-shelter');
            p.el.classList.add('emerging');
            setTimeout(()=>p.el.classList.remove('emerging'),750);
          }, hideTime);
        }, dur*1000+100);
        return; // skip normal wander this tick
      }
    }
    if(info.sky){
      // Sky creatures drift freely in 2D across the sky band
      const xRange=60+Math.random()*160;
      const yRange=20+Math.random()*60;
      let nx=p.x+(Math.random()<0.5?-1:1)*xRange;
      let ny=p.y+(Math.random()<0.5?-1:1)*yRange;
      nx=Math.min(Math.max(nx,15),dw-70);
      ny=Math.min(Math.max(ny,15),minY-55);
      const dist=Math.sqrt((nx-p.x)**2+(ny-p.y)**2);
      if(dist<15) return;
      const dur=Math.max(1.8,dist/55);
      p.el.style.transition=`left ${dur}s ease-in-out, top ${dur}s ease-in-out`;
      const face=p.el.querySelector('.p-face');
      if(face) face.style.transform=`scaleX(${nx<p.x?-1:1})`;
      p.el.style.left=nx+'px'; p.el.style.top=ny+'px';
      p.x=nx; p.y=ny;
    } else {
      // Ground animals: horizontal wander only
      const range=40+Math.random()*100;
      let nx=p.x+(Math.random()<0.5?-1:1)*range;
      nx=Math.min(Math.max(nx,10),dw-65);
      const dist=Math.abs(nx-p.x);
      if(dist<10) return;
      const dur=Math.max(1.2,dist/45);
      p.el.style.transition='left '+dur+'s linear';
      const face=p.el.querySelector('.p-face');
      if(face) face.style.transform='scaleX('+(nx<p.x?-1:1)+')';
      p.el.style.left=nx+'px'; p.x=nx;
    }
  });
}
setInterval(wanderTick,2200);
